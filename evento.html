<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tickets | Ruby Haze</title>
<link rel="icon" type="image/x-icon" href="assets/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@200;300;400;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.payphonetodoesposible.com/box/v2.0/payphone-payment-box.css">
<script type="module" src="https://cdn.payphonetodoesposible.com/box/v2.0/payphone-payment-box.js"></script>
<style>
  :root{
    --bg: #ffffff;
    --bg-soft: #fafafa;
    --line: rgba(162,3,26,0.15);
    --red: #a2031a;
    --red-dim: rgba(162,3,26,0.55);
    --red-dark: #7a0214;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  body{
    background: var(--bg);
    color: var(--red);
    font-family: 'Google Sans Flex', sans-serif;
    font-weight: 300;
  }

  h1,h2{
    font-family: 'Google Sans Flex', sans-serif;
    font-weight: 900;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--red);
  }

  header{
    position: sticky;
    top:0;
    z-index: 100;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 18px 6%;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
  }

  header .logo-mark{ width: 150px; height: 56px; }
  header .logo-mark img{ width:100%; height:100%; object-fit: contain; }

  .back-link{
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--red-dim);
    transition: color 0.25s;
  }
  .back-link:hover{ color: var(--red); }

  main{ max-width: 720px; margin: 0 auto; padding: 60px 6% 100px; }

  /* EVENT HERO */
  .event-hero{ text-align:center; margin-bottom: 60px; }
  .event-hero h1{ font-size: clamp(1.6rem, 5vw, 2.6rem); margin-bottom: 14px; }
  .event-meta{ color: var(--red-dim); font-size: 1rem; margin-bottom: 6px; }
  .event-price{ font-weight: 800; letter-spacing: 0.06em; margin-top: 10px; }

  .section-title{
    font-size: clamp(1.1rem, 2.6vw, 1.5rem);
    margin-bottom: 26px;
  }

  /* CARD / PAYPHONE */
  .card-logos{
    display:flex;
    gap: 10px;
    margin: 0 0 22px;
    flex-wrap: wrap;
  }
  .card-badge{
    border: 1px solid var(--line);
    color: var(--red-dim);
    font-weight: 800;
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    padding: 6px 12px;
  }

  .pp-card{
    --accent: var(--red);
    --accent-soft: rgba(162,3,26,0.16);
    position: relative;
    overflow: hidden;
    isolation: isolate;
    border: 1px solid rgba(0,0,0,0.08);
    padding: 30px;
  }
  .pp-card::before{
    content:'';
    position:absolute;
    inset:-30%;
    background: var(--accent-soft);
    filter: blur(40px);
    z-index: -1;
  }
  .pp-card p{ color: var(--red-dim); font-size: 0.85rem; margin-bottom: 20px; text-align:center; }
  #pp-button{ display:flex; justify-content:center; }
</style>
</head>
<body>

<header>
  <div class="logo-mark"><img src="assets/logo.png" alt="Ruby Haze"></div>
  <a class="back-link" href="index.html">&larr; Volver al inicio</a>
</header>

<main>

  <section class="event-hero">
    <h1 id="eventName">THE TRIBE PT.II</h1>
    <p class="event-meta" id="eventDate">Sábado 01 de Agosto · Kuno Seafood, Portoviejo</p>
    <p class="event-price" id="eventPrice">Entrada general: $15.92</p>
  </section>

  <section id="purchaseSection">
    <h2 class="section-title">Completa tu compra</h2>

    <div class="card-logos">
      <span class="card-badge">VISA</span>
      <span class="card-badge">MASTERCARD</span>
      <span class="card-badge">DINERS</span>
      <span class="card-badge">AMEX</span>
    </div>

    <div class="pp-card">
      <p>Tu pago se procesa de forma segura con Payphone. La compra se confirma solo cuando el pago es aprobado.</p>
      <div id="pp-button"></div>
    </div>
  </section>

</main>

<script>
  // ----- CONFIG: edita aquí los datos reales -----
  const CONFIG = {
    eventName: 'THE TRIBE PT.II',
    priceUSD: 15.92,
    // Token/StoreId de la app "Ruby Haze Tickets" — la Cajita de Payphone exige
    // que estos valores vivan en el navegador, así está diseñado su widget oficial.
    payphoneToken: '9ad8vjrkLEzpFwRti8WJorwelVfDCXOy5VNGJl8i5XkmTclGuP9PkJeiQ6yRxAm1-gqCSw8-9l46DC3UfV1R-0AsAbM5iExqxwNe61O8PkknV05E2hH3MTCuAemtxq6SxO2rX5CBIk2_eia0kmpVmYZ9yIp5p5vZveRGvYS93I_NXHRpmE-kNZIV1lS1bAmYjpqy67xVJzUhDmlzTIzRWU2pnYHyeWyHbh8OMjj7WFbZvGPYZ1xMKM8zc1wiyrbNoq6CIBlBSbjcCSgwJym2Wky9wjxr1Q2C9zZnzDO0wAGwItHdOgQOm5qyLfGM9_vnPxwqru5Nph6y9kb2-0t3EwBAt8k',
    payphoneStoreId: '6227abe0-9fc1-47cb-afdb-6505f3623b6f'
  };
  // ------------------------------------------------

  const clientTransactionId = 'RH-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
  const amountCents = Math.round(CONFIG.priceUSD * 100);

  window.addEventListener('DOMContentLoaded', () => {
    new PPaymentButtonBox({
      token: CONFIG.payphoneToken,
      clientTransactionId,
      amount: amountCents,
      amountWithoutTax: amountCents,
      amountWithTax: 0,
      tax: 0,
      currency: 'USD',
      storeId: CONFIG.payphoneStoreId,
      reference: `Ticket Ruby Haze`,
      lang: 'es'
    }).render('pp-button');
  });
</script>

</body>
</html>
