<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Tickets | Ruby Haze</title>
<link rel="icon" type="image/x-icon" href="assets/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@200;300;400;600;800;900&display=swap" rel="stylesheet">
<style>
  :root{ --yellow: #dbce44; }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    min-height:100vh;
    background:#0a0a0a;
    color:#ffffff;
    font-family:'Google Sans Flex', sans-serif;
    font-weight:300;
  }
  header{
    background:#000000;
    padding:18px 6%;
    text-align:center;
  }
  header h1{
    margin:0;
    color: var(--yellow);
    font-weight:900;
    letter-spacing:0.04em;
    text-transform:uppercase;
    font-size:1.3rem;
  }
  header p{ margin:4px 0 0; font-size:0.8rem; color:rgba(255,255,255,0.6); }

  main{ max-width:900px; margin:0 auto; padding:24px 4% 60px; }

  .gate{ margin-top:60px; text-align:center; }
  .gate input{
    width:100%;
    max-width:280px;
    padding:14px 16px;
    border-radius:12px;
    border:none;
    font-size:1rem;
    text-align:center;
    letter-spacing:0.1em;
    text-transform:uppercase;
    margin-bottom:14px;
  }
  .gate button{
    background: var(--yellow);
    color:#111111;
    border:none;
    padding:14px 32px;
    border-radius:10px;
    font-weight:800;
    font-size:0.85rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    cursor:pointer;
  }
  .gate-error{ color:#ff6b6b; font-size:0.85rem; margin-top:10px; display:none; }

  .toolbar{ display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
  .summary{ font-size:0.85rem; color:rgba(255,255,255,0.7); }
  .summary strong{ color: var(--yellow); }
  .print-btn{
    background:rgba(255,255,255,0.1); color:#ffffff; border:none;
    padding:10px 18px; border-radius:10px; font-weight:800; font-size:0.75rem;
    letter-spacing:0.05em; text-transform:uppercase; cursor:pointer;
  }

  table{ width:100%; border-collapse: collapse; font-size:0.85rem; }
  thead th{
    text-align:left; padding:10px 8px; color:#0a0a0a; background: var(--yellow);
    font-size:0.7rem; text-transform:uppercase; letter-spacing:0.04em;
  }
  tbody td{ padding:10px 8px; border-bottom:1px solid rgba(255,255,255,0.08); }
  tbody tr.full{ color: rgba(255,255,255,0.4); }
  tbody tr.partial td:first-child{ border-left:3px solid var(--yellow); }
  tbody tr.pending td:first-child{ border-left:3px solid #2ecc71; }
  .badge{ display:inline-block; padding:3px 8px; border-radius:8px; font-size:0.7rem; font-weight:800; }
  .badge.pending{ background:rgba(46,204,113,0.15); color:#2ecc71; }
  .badge.partial{ background:rgba(219,206,68,0.15); color:var(--yellow); }
  .badge.full{ background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.5); }

  .empty{ text-align:center; color:rgba(255,255,255,0.5); margin-top:40px; }

  @media print{
    body{ background:#ffffff; color:#000000; }
    header{ background:#ffffff; }
    header h1{ color:#000000; }
    header p{ color:#333333; }
    .toolbar{ display:none; }
    thead th{ background:#dddddd; color:#000000; }
    tbody td{ border-bottom:1px solid #cccccc; }
    .badge.pending{ background:#e8e8e8; color:#000000; }
    .badge.partial{ background:#e8e8e8; color:#000000; }
    .badge.full{ background:#f4f4f4; color:#777777; }
  }
</style>
</head>
<body>

<header>
  <h1>Lista de Tickets</h1>
  <p>THE TRIBE PT.II — Kuno Seafood Rooftop</p>
</header>

<main>

  <div class="gate" id="gate">
    <p>Ingresa la clave de acceso del personal:</p>
    <input type="password" id="gateInput" placeholder="Clave" autocomplete="off">
    <br>
    <button type="button" id="gateBtn">Entrar</button>
    <p class="gate-error" id="gateError">Clave incorrecta.</p>
  </div>

  <div id="listWrap" style="display:none;">
    <div class="toolbar">
      <span class="summary" id="summary"></span>
      <button type="button" class="print-btn" id="printBtn">Imprimir</button>
    </div>
    <table id="listTable" style="display:none;">
      <thead>
        <tr>
          <th>#</th>
          <th>Nombre</th>
          <th>Cédula</th>
          <th>Cant.</th>
          <th>Ingresaron</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody id="listBody"></tbody>
    </table>
    <p class="empty" id="emptyMsg" style="display:none;">Todavía no hay tickets vendidos.</p>
  </div>

</main>

<script>
  const gate = document.getElementById('gate');
  const gateInput = document.getElementById('gateInput');
  const gateBtn = document.getElementById('gateBtn');
  const gateError = document.getElementById('gateError');
  const listWrap = document.getElementById('listWrap');
  const summaryEl = document.getElementById('summary');
  const listTable = document.getElementById('listTable');
  const listBody = document.getElementById('listBody');
  const emptyMsg = document.getElementById('emptyMsg');
  const printBtn = document.getElementById('printBtn');

  let scanKey = sessionStorage.getItem('rh_scan_key') || '';

  async function loadList(){
    gate.style.display = 'none';
    listWrap.style.display = 'block';

    try{
      const res = await fetch('/api/tickets/list', {
        headers: { 'x-scan-key': scanKey }
      });

      if(res.status === 401){
        sessionStorage.removeItem('rh_scan_key');
        gate.style.display = 'block';
        listWrap.style.display = 'none';
        gateError.style.display = 'block';
        return;
      }

      const data = await res.json();
      const list = data.list || [];

      if(list.length === 0){
        emptyMsg.style.display = 'block';
        listTable.style.display = 'none';
        summaryEl.textContent = '';
        return;
      }

      let totalPersonas = 0;
      let totalIngresados = 0;

      listBody.innerHTML = list.map((t) => {
        const approved = typeof t.entriesApproved === 'number'
          ? t.entriesApproved
          : (t.used ? t.quantity : 0);
        totalPersonas += t.quantity;
        totalIngresados += approved;

        let status, rowClass;
        if(approved >= t.quantity){
          status = '<span class="badge full">Completo</span>';
          rowClass = 'full';
        } else if(approved > 0){
          status = '<span class="badge partial">Parcial</span>';
          rowClass = 'partial';
        } else {
          status = '<span class="badge pending">Pendiente</span>';
          rowClass = 'pending';
        }

        return `<tr class="${rowClass}">
          <td>${t.listNumber}</td>
          <td>${t.cardholderName || '(sin nombre)'}</td>
          <td>${t.document || '—'}</td>
          <td>${t.quantity}</td>
          <td>${approved}/${t.quantity}</td>
          <td>${status}</td>
        </tr>`;
      }).join('');

      summaryEl.innerHTML = `<strong>${list.length}</strong> tickets · <strong>${totalPersonas}</strong> personas · <strong>${totalIngresados}</strong> ya ingresaron`;
      listTable.style.display = 'table';
      emptyMsg.style.display = 'none';
    } catch(err){
      emptyMsg.textContent = 'Error de conexión, intenta de nuevo.';
      emptyMsg.style.display = 'block';
    }
  }

  printBtn.addEventListener('click', () => window.print());

  gateBtn.addEventListener('click', () => {
    scanKey = gateInput.value.trim();
    if(!scanKey){ return; }
    sessionStorage.setItem('rh_scan_key', scanKey);
    gateError.style.display = 'none';
    loadList();
  });

  gateInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter') gateBtn.click();
  });

  if(scanKey){
    loadList();
  }
</script>

</body>
</html>
