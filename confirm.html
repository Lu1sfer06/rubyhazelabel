<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmando pago | Ruby Haze</title>
<link rel="icon" type="image/x-icon" href="assets/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@200;300;400;600;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #ffffff;
    --red: #a2031a;
    --red-dim: rgba(162,3,26,0.55);
    --red-dark: #7a0214;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background: var(--bg);
    color: var(--red);
    font-family: 'Google Sans Flex', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding: 40px 6%;
  }
  main{ max-width: 480px; width:100%; }

  h1{
    font-family: 'Google Sans Flex', sans-serif;
    font-weight: 900;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-size: clamp(1.4rem, 4vw, 2rem);
    margin-bottom: 16px;
    opacity: 0;
    transform: translateY(8px);
    animation: rise 0.6s ease forwards;
  }
  p{ color: var(--red-dim); line-height: 1.6; margin-bottom: 14px; opacity: 0; transform: translateY(8px); animation: rise 0.6s ease forwards; animation-delay: 0.1s; }

  @keyframes rise{ to{ opacity:1; transform:translateY(0); } }

  .spinner-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 22px;
  }
  .spinner{
    width: 54px;
    height: 54px;
    border-radius: 50%;
    border: 3px solid rgba(162,3,26,0.15);
    border-top-color: var(--red);
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  .contact-row{
    display:flex;
    gap: 14px;
    flex-wrap: wrap;
    margin: 22px 0 28px;
  }
  .wa-btn{
    flex:1;
    min-width: 150px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 10px;
    border: 1px solid #25D366;
    color: #25D366;
    padding: 16px;
    font-weight: 800;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    transition: background 0.25s, color 0.25s;
  }
  .wa-btn svg{ width: 20px; height: 20px; flex-shrink: 0; transition: filter 0.25s; }
  .wa-btn:hover{ background: #25D366; color:#fff; }
  .wa-btn:hover svg{ filter: brightness(0) invert(1); }

  .btn-home{
    display:inline-block;
    background: var(--red);
    color: #fff;
    border: none;
    padding: 16px 36px;
    font-weight: 800;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    transition: background 0.25s, transform 0.25s;
  }
  .btn-home:hover{ background: var(--red-dark); transform: translateY(-2px); }

  .back-link{
    display:inline-block;
    margin-top: 20px;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--red-dim);
  }
  .back-link:hover{ color: var(--red); }

  #resultScreen{ display:none; }
</style>
</head>
<body>
<main>

  <div class="spinner-wrap" id="loadingScreen">
    <div class="spinner"></div>
    <h1>Confirmando tu pago</h1>
    <p>Espera un momento, no cierres esta ventana.</p>
  </div>

  <div id="resultScreen">
    <h1 id="statusTitle"></h1>
    <p id="statusMessage"></p>
    <div class="contact-row" id="contactRow" style="display:none;">
      <a class="wa-btn" id="wa1" target="_blank" rel="noopener">
        <svg viewBox="0 0 360 362"><path fill="#25D366" fill-rule="evenodd" d="M307.546 52.566C273.709 18.684 228.706.017 180.756 0 81.951 0 1.538 80.404 1.504 179.235c-.017 31.594 8.242 62.432 23.928 89.609L0 361.736l95.024-24.925c26.179 14.285 55.659 21.805 85.655 21.814h.077c98.788 0 179.21-80.413 179.244-179.244.017-47.898-18.608-92.926-52.454-126.807v-.008Zm-126.79 275.788h-.06c-26.73-.008-52.952-7.194-75.831-20.765l-5.44-3.231-56.391 14.791 15.05-54.981-3.542-5.638c-14.912-23.721-22.793-51.139-22.776-79.286.035-82.14 66.867-148.973 149.051-148.973 39.793.017 77.198 15.53 105.328 43.695 28.131 28.157 43.61 65.596 43.593 105.398-.035 82.149-66.867 148.982-148.982 148.982v.008Zm81.719-111.577c-4.478-2.243-26.497-13.073-30.606-14.568-4.108-1.496-7.09-2.243-10.073 2.243-2.982 4.487-11.568 14.577-14.181 17.559-2.613 2.991-5.226 3.361-9.704 1.117-4.477-2.243-18.908-6.97-36.02-22.226-13.313-11.878-22.304-26.54-24.916-31.027-2.613-4.486-.275-6.91 1.959-9.136 2.011-2.011 4.478-5.234 6.721-7.847 2.244-2.613 2.983-4.486 4.478-7.469 1.496-2.991.748-5.603-.369-7.847-1.118-2.243-10.073-24.289-13.812-33.253-3.636-8.732-7.331-7.546-10.073-7.692-2.613-.13-5.595-.155-8.586-.155-2.991 0-7.839 1.118-11.947 5.604-4.108 4.486-15.677 15.324-15.677 37.361s16.047 43.344 18.29 46.335c2.243 2.991 31.585 48.225 76.51 67.632 10.684 4.615 19.029 7.374 25.535 9.437 10.727 3.412 20.49 2.931 28.208 1.779 8.604-1.289 26.498-10.838 30.228-21.298 3.73-10.46 3.73-19.433 2.613-21.298-1.117-1.865-4.108-2.991-8.586-5.234l.008-.017Z" clip-rule="evenodd"/></svg>
        Contacto 1
      </a>
      <a class="wa-btn" id="wa2" target="_blank" rel="noopener">
        <svg viewBox="0 0 360 362"><path fill="#25D366" fill-rule="evenodd" d="M307.546 52.566C273.709 18.684 228.706.017 180.756 0 81.951 0 1.538 80.404 1.504 179.235c-.017 31.594 8.242 62.432 23.928 89.609L0 361.736l95.024-24.925c26.179 14.285 55.659 21.805 85.655 21.814h.077c98.788 0 179.21-80.413 179.244-179.244.017-47.898-18.608-92.926-52.454-126.807v-.008Zm-126.79 275.788h-.06c-26.73-.008-52.952-7.194-75.831-20.765l-5.44-3.231-56.391 14.791 15.05-54.981-3.542-5.638c-14.912-23.721-22.793-51.139-22.776-79.286.035-82.14 66.867-148.973 149.051-148.973 39.793.017 77.198 15.53 105.328 43.695 28.131 28.157 43.61 65.596 43.593 105.398-.035 82.149-66.867 148.982-148.982 148.982v.008Zm81.719-111.577c-4.478-2.243-26.497-13.073-30.606-14.568-4.108-1.496-7.09-2.243-10.073 2.243-2.982 4.487-11.568 14.577-14.181 17.559-2.613 2.991-5.226 3.361-9.704 1.117-4.477-2.243-18.908-6.97-36.02-22.226-13.313-11.878-22.304-26.54-24.916-31.027-2.613-4.486-.275-6.91 1.959-9.136 2.011-2.011 4.478-5.234 6.721-7.847 2.244-2.613 2.983-4.486 4.478-7.469 1.496-2.991.748-5.603-.369-7.847-1.118-2.243-10.073-24.289-13.812-33.253-3.636-8.732-7.331-7.546-10.073-7.692-2.613-.13-5.595-.155-8.586-.155-2.991 0-7.839 1.118-11.947 5.604-4.108 4.486-15.677 15.324-15.677 37.361s16.047 43.344 18.29 46.335c2.243 2.991 31.585 48.225 76.51 67.632 10.684 4.615 19.029 7.374 25.535 9.437 10.727 3.412 20.49 2.931 28.208 1.779 8.604-1.289 26.498-10.838 30.228-21.298 3.73-10.46 3.73-19.433 2.613-21.298-1.117-1.865-4.108-2.991-8.586-5.234l.008-.017Z" clip-rule="evenodd"/></svg>
        Contacto 2
      </a>
    </div>
    <a class="btn-home" id="homeBtn" href="index.html" style="display:none;">Volver al inicio</a>
    <br>
    <a class="back-link" id="backLink" href="evento.html" style="display:none;">&larr; Volver a la página del ticket</a>
  </div>

</main>

<script>
  const WEB3FORMS_ACCESS_KEY = '6da871fd-2211-4b44-a3b8-1258cf288fdd';
  const EVENT_NAME = 'THE TRIBE PT.II';
  const WHATSAPP_NUMBERS = [
    { number: '593978820979' },
    { number: '593986945986' }
  ];

  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const clientTransactionId = params.get('clientTransactionId');

  const loadingScreen = document.getElementById('loadingScreen');
  const resultScreen = document.getElementById('resultScreen');
  const statusTitle = document.getElementById('statusTitle');
  const statusMessage = document.getElementById('statusMessage');
  const contactRow = document.getElementById('contactRow');
  const homeBtn = document.getElementById('homeBtn');
  const backLink = document.getElementById('backLink');

  function showResult(){
    loadingScreen.style.display = 'none';
    resultScreen.style.display = 'block';
  }

  function setupContacts(message){
    const text = encodeURIComponent(message);
    WHATSAPP_NUMBERS.forEach((wa, i) => {
      document.getElementById('wa' + (i + 1)).href = `https://wa.me/${wa.number}?text=${text}`;
    });
    contactRow.style.display = 'flex';
  }

  async function notifyPurchase(data){
    const formData = new FormData();
    formData.append('access_key', WEB3FORMS_ACCESS_KEY);
    formData.append('subject', 'Nuevo ticket comprado — Ruby Haze (Tarjeta)');
    formData.append('from_name', 'Ruby Haze — Tickets');
    formData.append('cardholder_name', data.cardholderName || '');
    formData.append('cedula', data.document || '');
    formData.append('phone', data.phoneNumber || '');
    formData.append('email', data.email || '');
    formData.append('payment_method', 'tarjeta (Payphone)');
    formData.append('transaction_id', data.transactionId || '');
    formData.append('event', EVENT_NAME);

    try{
      await fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        headers: { 'Accept': 'application/json' },
        body: formData
      });
    } catch(err){ /* la notificación es informativa, no bloquea la confirmación */ }
  }

  async function confirmPayment(){
    if(!id || !clientTransactionId){
      statusTitle.textContent = 'No pudimos confirmar tu pago';
      statusMessage.textContent = 'Faltan datos de la transacción. Si realizaste el pago, contáctanos por WhatsApp con tu comprobante.';
      setupContacts('Hola, tengo una consulta sobre mi pago para THE TRIBE PT.II.');
      backLink.style.display = 'inline-block';
      showResult();
      return;
    }

    // Pequeña pausa para que el efecto de carga se sienta suave, no instantáneo.
    const minWait = new Promise(r => setTimeout(r, 900));

    try{
      const [res] = await Promise.all([
        fetch('/api/payphone/confirm', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, clientTransactionId })
        }),
        minWait
      ]);
      const data = await res.json();

      if(data.success){
        statusTitle.textContent = '¡Listo!';
        statusMessage.textContent = `Gracias por confirmar tu asistencia al evento THE TRIBE PT.II para el sábado 01 de agosto en Kuno Seafood, Portoviejo. En breve enviaremos tu ticket a tu correo o al número que nos otorgaste. En caso de dudas o consultas, por favor contáctanos a estos medios:`;
        setupContacts('Hola, tengo una consulta sobre mi ticket para THE TRIBE PT.II.');
        homeBtn.style.display = 'inline-block';
        notifyPurchase(data);
      } else {
        statusTitle.textContent = 'El pago no se completó';
        statusMessage.textContent = 'Estado: ' + (data.status || 'desconocido') + '. Si crees que esto es un error, contáctanos por WhatsApp.';
        setupContacts('Hola, tengo una consulta sobre mi pago para THE TRIBE PT.II.');
        backLink.style.display = 'inline-block';
      }
    } catch(err){
      statusTitle.textContent = 'No pudimos confirmar tu pago';
      statusMessage.textContent = 'Hubo un error de conexión. Si realizaste el pago, contáctanos por WhatsApp con tu comprobante.';
      setupContacts('Hola, tengo una consulta sobre mi pago para THE TRIBE PT.II.');
      backLink.style.display = 'inline-block';
    }

    showResult();
  }

  confirmPayment();
</script>
</body>
</html>
