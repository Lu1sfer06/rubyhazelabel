<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmando pago | Ruby Haze</title>
<link rel="icon" type="image/x-icon" href="assets/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@200;300;400;600;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<style>
  :root{
    --yellow: #dbce44;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  /* Fondo fijo al tamaño de la pantalla: pintado directo en body,
     background-size:cover se calcula contra todo el alto de la página
     (más alto que la pantalla si hay scroll) y se recorta mal en móvil. */
  .bg-photo{
    position: fixed;
    inset: 0;
    z-index: -1;
    background:
      linear-gradient(180deg, rgba(10,10,10,0.6), rgba(10,10,10,0.78)),
      url('eventos/gustavo%20web.jpg') center 40%/cover no-repeat;
  }
  body{
    background: #0a0a0a;
    color: rgba(255,255,255,0.88);
    font-family: 'Google Sans Flex', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display:flex;
    flex-direction: column;
  }
  main{
    flex: 1;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding: 40px 6%;
  }
  main > div{ max-width: 480px; width:100%; }

  .brand-logos{
    display:flex;
    justify-content:center;
    align-items:center;
    gap: 6px;
    margin: 0 0 18px;
  }
  .brand-logo{
    height: 90px;
    width: auto;
    object-fit: contain;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
  }

  footer{
    background: #000000;
    padding: 28px 8%;
    text-align: center;
  }
  footer .legal{
    font-size: 0.85rem;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.03em;
    max-width: 600px;
    margin: 0 auto;
  }
  footer .legal a{ color: rgba(255,255,255,0.6); text-decoration: underline; }
  footer .legal a:hover{ color: var(--yellow); }

  .contact-heading{
    color: #ffffff;
    font-weight: 700;
    text-align: center;
    margin-top: -6px;
  }

  h1{
    font-family: 'Google Sans Flex', sans-serif;
    font-weight: 900;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-size: clamp(1.4rem, 4vw, 2rem);
    color: var(--yellow);
    margin-bottom: 16px;
    opacity: 0;
    transform: translateY(8px);
    animation: rise 0.6s ease forwards;
  }
  p{ line-height: 1.6; margin-bottom: 14px; opacity: 0; transform: translateY(8px); animation: rise 0.6s ease forwards; animation-delay: 0.1s; }

  @keyframes rise{ to{ opacity:1; transform:translateY(0); } }

  .spinner-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 22px;
  }
  .spinner{
    width: 54px;
    height: 54px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.2);
    border-top-color: var(--yellow);
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  .contact-row{
    display:flex;
    gap: 14px;
    flex-wrap: wrap;
    margin: 22px 0 28px;
  }
  .wa-btn{
    flex:1;
    min-width: 150px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 10px;
    background: #ffffff;
    border: none;
    border-radius: 14px;
    box-shadow: 0 10px 28px rgba(0,0,0,0.3);
    color: #25D366;
    padding: 16px;
    font-weight: 800;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    transition: transform 0.25s, box-shadow 0.25s;
  }
  .wa-btn svg{ width: 20px; height: 20px; flex-shrink: 0; }
  .wa-btn:hover{ transform: translateY(-2px); box-shadow: 0 14px 32px rgba(0,0,0,0.35); }

  .btn-home{
    display:inline-block;
    background: var(--yellow);
    color: #111111;
    border: none;
    padding: 16px 36px;
    font-weight: 800;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-decoration: none;
    transition: transform 0.25s, box-shadow 0.25s;
  }
  .btn-home:hover{ transform: translateY(-2px); box-shadow: 0 10px 26px rgba(219,206,68,0.4); }

  .back-link{
    display:inline-block;
    margin-top: 20px;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
  }
  .back-link:hover{ color: var(--yellow); }

  #resultScreen{ display:none; }
</style>
</head>
<body>
<div class="bg-photo"></div>
<main>

  <div class="spinner-wrap" id="loadingScreen">
    <div class="spinner"></div>
    <h1>Confirmando tu pago</h1>
    <p>Espera un momento, no cierres esta ventana.</p>
  </div>

  <div id="resultScreen">
    <div class="brand-logos" id="brandLogos" style="display:none;">
      <img src="eventos/rhz%20blanco.png" alt="Ruby Haze" class="brand-logo">
      <img src="eventos/kuno%20logo%20blanco.png" alt="Kuno Seafood" class="brand-logo">
    </div>

    <h1 id="statusTitle"></h1>

    <p id="statusIntro" style="display:none;"></p>
    <p id="statusMessage"></p>
    <p class="contact-heading" id="contactHeading" style="display:none;">¡Contáctanos!</p>
    <div class="contact-row" id="contactRow" style="display:none;">
      <a class="wa-btn" id="wa1" target="_blank" rel="noopener">
        <svg viewBox="0 0 360 362"><path fill="#25D366" fill-rule="evenodd" d="M307.546 52.566C273.709 18.684 228.706.017 180.756 0 81.951 0 1.538 80.404 1.504 179.235c-.017 31.594 8.242 62.432 23.928 89.609L0 361.736l95.024-24.925c26.179 14.285 55.659 21.805 85.655 21.814h.077c98.788 0 179.21-80.413 179.244-179.244.017-47.898-18.608-92.926-52.454-126.807v-.008Zm-126.79 275.788h-.06c-26.73-.008-52.952-7.194-75.831-20.765l-5.44-3.231-56.391 14.791 15.05-54.981-3.542-5.638c-14.912-23.721-22.793-51.139-22.776-79.286.035-82.14 66.867-148.973 149.051-148.973 39.793.017 77.198 15.53 105.328 43.695 28.131 28.157 43.61 65.596 43.593 105.398-.035 82.149-66.867 148.982-148.982 148.982v.008Zm81.719-111.577c-4.478-2.243-26.497-13.073-30.606-14.568-4.108-1.496-7.09-2.243-10.073 2.243-2.982 4.487-11.568 14.577-14.181 17.559-2.613 2.991-5.226 3.361-9.704 1.117-4.477-2.243-18.908-6.97-36.02-22.226-13.313-11.878-22.304-26.54-24.916-31.027-2.613-4.486-.275-6.91 1.959-9.136 2.011-2.011 4.478-5.234 6.721-7.847 2.244-2.613 2.983-4.486 4.478-7.469 1.496-2.991.748-5.603-.369-7.847-1.118-2.243-10.073-24.289-13.812-33.253-3.636-8.732-7.331-7.546-10.073-7.692-2.613-.13-5.595-.155-8.586-.155-2.991 0-7.839 1.118-11.947 5.604-4.108 4.486-15.677 15.324-15.677 37.361s16.047 43.344 18.29 46.335c2.243 2.991 31.585 48.225 76.51 67.632 10.684 4.615 19.029 7.374 25.535 9.437 10.727 3.412 20.49 2.931 28.208 1.779 8.604-1.289 26.498-10.838 30.228-21.298 3.73-10.46 3.73-19.433 2.613-21.298-1.117-1.865-4.108-2.991-8.586-5.234l.008-.017Z" clip-rule="evenodd"/></svg>
        Contacto 1
      </a>
      <a class="wa-btn" id="wa2" target="_blank" rel="noopener">
        <svg viewBox="0 0 360 362"><path fill="#25D366" fill-rule="evenodd" d="M307.546 52.566C273.709 18.684 228.706.017 180.756 0 81.951 0 1.538 80.404 1.504 179.235c-.017 31.594 8.242 62.432 23.928 89.609L0 361.736l95.024-24.925c26.179 14.285 55.659 21.805 85.655 21.814h.077c98.788 0 179.21-80.413 179.244-179.244.017-47.898-18.608-92.926-52.454-126.807v-.008Zm-126.79 275.788h-.06c-26.73-.008-52.952-7.194-75.831-20.765l-5.44-3.231-56.391 14.791 15.05-54.981-3.542-5.638c-14.912-23.721-22.793-51.139-22.776-79.286.035-82.14 66.867-148.973 149.051-148.973 39.793.017 77.198 15.53 105.328 43.695 28.131 28.157 43.61 65.596 43.593 105.398-.035 82.149-66.867 148.982-148.982 148.982v.008Zm81.719-111.577c-4.478-2.243-26.497-13.073-30.606-14.568-4.108-1.496-7.09-2.243-10.073 2.243-2.982 4.487-11.568 14.577-14.181 17.559-2.613 2.991-5.226 3.361-9.704 1.117-4.477-2.243-18.908-6.97-36.02-22.226-13.313-11.878-22.304-26.54-24.916-31.027-2.613-4.486-.275-6.91 1.959-9.136 2.011-2.011 4.478-5.234 6.721-7.847 2.244-2.613 2.983-4.486 4.478-7.469 1.496-2.991.748-5.603-.369-7.847-1.118-2.243-10.073-24.289-13.812-33.253-3.636-8.732-7.331-7.546-10.073-7.692-2.613-.13-5.595-.155-8.586-.155-2.991 0-7.839 1.118-11.947 5.604-4.108 4.486-15.677 15.324-15.677 37.361s16.047 43.344 18.29 46.335c2.243 2.991 31.585 48.225 76.51 67.632 10.684 4.615 19.029 7.374 25.535 9.437 10.727 3.412 20.49 2.931 28.208 1.779 8.604-1.289 26.498-10.838 30.228-21.298 3.73-10.46 3.73-19.433 2.613-21.298-1.117-1.865-4.108-2.991-8.586-5.234l.008-.017Z" clip-rule="evenodd"/></svg>
        Contacto 2
      </a>
    </div>
    <a class="btn-home" id="homeBtn" href="ticketsTHETRIBEPTII" style="display:none;">Volver al inicio</a>
    <br>
    <a class="back-link" id="backLink" href="ticketsTHETRIBEPTII" style="display:none;">&larr; Volver a la página del ticket</a>
  </div>

</main>

<footer>
  <div class="legal">© <span id="year"></span> Ruby Haze. Todos los derechos reservados. · Contacto: <a href="mailto:maison@rubyhazelabel.com">maison@rubyhazelabel.com</a></div>
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();
</script>
<script>
  const WHATSAPP_NUMBERS = [
    { number: '593978820979' },
    { number: '593986945986' }
  ];

  const WEB3FORMS_ACCESS_KEY = '6da871fd-2211-4b44-a3b8-1258cf288fdd';
  const EVENT_NAME = 'THE TRIBE PT.II';

  // Web3Forms (plan gratuito) solo acepta envíos hechos directamente desde
  // el navegador, no desde un servidor — por eso este aviso vive aquí y no
  // en server.js. Solo se llama cuando el servidor ya confirmó un pago real
  // y no repetido (data.success === true), así que sigue siendo imposible
  // de spamear.
  function notifyAdmin(ticket){
    const formData = new URLSearchParams();
    formData.append('access_key', WEB3FORMS_ACCESS_KEY);
    formData.append('subject', 'Nuevo ticket comprado — Ruby Haze (Tarjeta)');
    formData.append('from_name', 'Ruby Haze — Tickets');
    formData.append('cardholder_name', ticket.cardholderName || '');
    formData.append('cedula', ticket.document || '');
    formData.append('phone', ticket.phoneNumber || '');
    formData.append('email', ticket.email || '');
    formData.append('payment_method', 'tarjeta (Payphone)');
    formData.append('transaction_id', ticket.transactionId || '');
    formData.append('quantity', ticket.quantity || 1);
    formData.append('event', EVENT_NAME);

    fetch('https://api.web3forms.com/submit', {
      method: 'POST',
      headers: { 'Accept': 'application/json', 'Content-Type': 'application/x-www-form-urlencoded' },
      body: formData.toString()
    }).catch((err) => console.error('Error notificando al admin:', err));
  }

  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const clientTransactionId = params.get('clientTransactionId');

  const loadingScreen = document.getElementById('loadingScreen');
  const resultScreen = document.getElementById('resultScreen');
  const statusTitle = document.getElementById('statusTitle');
  const statusIntro = document.getElementById('statusIntro');
  const statusMessage = document.getElementById('statusMessage');
  const brandLogos = document.getElementById('brandLogos');
  const contactHeading = document.getElementById('contactHeading');
  const contactRow = document.getElementById('contactRow');
  const homeBtn = document.getElementById('homeBtn');
  const backLink = document.getElementById('backLink');

  function showResult(){
    loadingScreen.style.display = 'none';
    resultScreen.style.display = 'block';
  }

  function setupContacts(message){
    const text = encodeURIComponent(message);
    WHATSAPP_NUMBERS.forEach((wa, i) => {
      document.getElementById('wa' + (i + 1)).href = `https://wa.me/${wa.number}?text=${text}`;
    });
    contactHeading.style.display = 'block';
    contactRow.style.display = 'flex';
  }

  // Solo festejamos cuando el pago quedó confirmado de verdad, nunca en
  // "enlace ya usado" ni en errores.
  function fireConfetti(){
    if(typeof confetti !== 'function') return;
    confetti({ particleCount: 130, spread: 90, origin: { y: 0.4 }, colors: ['#dbce44', '#ffffff', '#a2031a'] });
    setTimeout(() => confetti({ particleCount: 70, spread: 130, origin: { y: 0.3 }, colors: ['#dbce44', '#ffffff'] }), 300);
  }

  function setIntro(quantity){
    const asistencia = quantity > 1 ? `tus ${quantity} entradas` : 'tu asistencia';
    statusIntro.innerHTML = `Confirmamos ${asistencia} para el evento <span style="color:var(--yellow);">THE TRIBE PT.II el sábado 01 de agosto a las 9pm en Kuno Seafood Rooftop, Portoviejo.</span>`;
    statusIntro.style.display = 'block';
  }

  async function confirmPayment(){
    // Atajos solo para previsualizar diseños sin una compra real.
    if(params.get('preview') === '1'){
      const previewQty = Math.max(1, parseInt(params.get('qty'), 10) || 1);
      fireConfetti();
      brandLogos.style.display = 'flex';
      statusTitle.textContent = 'GRACIAS POR TU COMPRA';
      setIntro(previewQty);
      statusMessage.textContent = 'En breve enviaremos tu ticket al correo que nos otorgaste. Si tienes dudas o consultas, contáctanos:';
      setupContacts('Hola, acabo de comprar mi ticket para THE TRIBE PT.II en la página y tengo una consulta.');
      contactHeading.style.display = 'none';
      homeBtn.style.display = 'inline-block';
      showResult();
      return;
    }
    if(params.get('preview') === 'used'){
      statusTitle.textContent = 'Este enlace ya fue usado';
      statusMessage.textContent = 'Te llevamos a la página del evento...';
      showResult();
      return;
    }

    if(!id || !clientTransactionId){
      statusTitle.textContent = 'No pudimos confirmar tu pago';
      statusMessage.textContent = 'Faltan datos de la transacción. Si realizaste el pago, contáctanos por WhatsApp con tu comprobante.';
      setupContacts('Hola, tengo una consulta sobre mi pago para THE TRIBE PT.II.');
      backLink.style.display = 'inline-block';
      showResult();
      return;
    }

    // Pequeña pausa para que el efecto de carga se sienta suave, no instantáneo.
    const minWait = new Promise(r => setTimeout(r, 900));

    // Nunca dejar al usuario viendo el spinner para siempre, sin importar
    // qué tan lento responda el servidor.
    const controller = new AbortController();
    const hardTimeout = setTimeout(() => controller.abort(), 20000);

    try{
      const [res] = await Promise.all([
        fetch('/api/payphone/confirm', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, clientTransactionId }),
          signal: controller.signal
        }),
        minWait
      ]);
      clearTimeout(hardTimeout);
      const data = await res.json();

      if(data.success){
        notifyAdmin(data);
        const quantity = Math.max(1, parseInt(data.quantity, 10) || 1);
        fireConfetti();
        brandLogos.style.display = 'flex';
        statusTitle.textContent = 'GRACIAS POR TU COMPRA';
        setIntro(quantity);
        statusMessage.textContent = 'En breve enviaremos tu ticket al correo que nos otorgaste. Si tienes dudas o consultas, contáctanos:';
        setupContacts('Hola, acabo de comprar mi ticket para THE TRIBE PT.II en la página y tengo una consulta.');
        contactHeading.style.display = 'none';
        homeBtn.style.display = 'inline-block';
      } else if(data.status === 'AlreadyUsed'){
        statusTitle.textContent = 'Este enlace ya fue usado';
        statusMessage.textContent = 'Te llevamos a la página del evento...';
        showResult();
        setTimeout(() => { window.location.replace('ticketsTHETRIBEPTII'); }, 1400);
        return;
      } else {
        statusTitle.textContent = 'El pago no se completó';
        statusMessage.textContent = 'Estado: ' + (data.status || 'desconocido') + '. Si crees que esto es un error, contáctanos por WhatsApp.';
        setupContacts('Hola, tengo una consulta sobre mi pago para THE TRIBE PT.II.');
        backLink.style.display = 'inline-block';
      }
    } catch(err){
      statusTitle.textContent = 'No pudimos confirmar tu pago';
      statusMessage.textContent = 'Hubo un error de conexión. Si realizaste el pago, contáctanos por WhatsApp con tu comprobante.';
      setupContacts('Hola, tengo una consulta sobre mi pago para THE TRIBE PT.II.');
      backLink.style.display = 'inline-block';
    }

    showResult();
  }

  confirmPayment();
</script>
</body>
</html>
