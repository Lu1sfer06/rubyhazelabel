<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<title>Escaneo de Tickets | Ruby Haze</title>
<link rel="icon" type="image/x-icon" href="assets/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@200;300;400;600;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{ --yellow: #dbce44; }
  *{ box-sizing: border-box; }
  html, body{ touch-action: manipulation; height:100%; overflow:hidden; }
  body{
    margin:0;
    height:100vh;
    height:100dvh;
    background:#0a0a0a;
    color:#ffffff;
    font-family:'Google Sans Flex', sans-serif;
    font-weight:300;
    display:flex;
    flex-direction:column;
  }
  header{
    background:#000000;
    padding:8px 6%;
    text-align:center;
    flex:0 0 auto;
  }
  header h1{
    margin:0;
    color: var(--yellow);
    font-weight:900;
    letter-spacing:0.04em;
    text-transform:uppercase;
    font-size:1.05rem;
  }
  header p{ margin:2px 0 0; font-size:0.7rem; color:rgba(255,255,255,0.6); }

  main{
    max-width:480px;
    width:100%;
    margin:0 auto;
    padding:10px 5%;
    text-align:center;
    flex:1 1 auto;
    display:flex;
    flex-direction:column;
    min-height:0;
    overflow:hidden;
  }

  .gate{ margin-top:60px; }
  .gate input{
    width:100%;
    max-width:280px;
    padding:14px 16px;
    border-radius:12px;
    border:none;
    font-size:1rem;
    text-align:center;
    letter-spacing:0.1em;
    text-transform:uppercase;
    margin-bottom:14px;
  }
  .gate button{
    background: var(--yellow);
    color:#111111;
    border:none;
    padding:14px 32px;
    border-radius:10px;
    font-weight:800;
    font-size:0.85rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    cursor:pointer;
  }
  .gate-error{ color:#ff6b6b; font-size:0.85rem; margin-top:10px; display:none; }

  #scannerWrap{ flex:1 1 auto; display:flex; flex-direction:column; min-height:0; overflow:hidden; }

  #reader{ width:100%; border-radius:16px; overflow:hidden; margin-top:6px; flex:1 1 auto; min-height:100px; }
  #reader video{ max-height:100%; object-fit:cover; }
  #scannerWrap.compact #reader{ flex:0 0 86px; min-height:86px; }

  .result{
    margin-top:8px;
    padding:10px 14px;
    border-radius:14px;
    font-weight:800;
    font-size:0.9rem;
    display:none;
    flex:1 1 auto;
    overflow-y:auto;
    flex-direction:column;
    justify-content:center;
  }
  .result.ok{ background: rgba(46, 204, 113, 0.15); border:2px solid #2ecc71; color:#2ecc71; }
  .result.fail{ background: rgba(255, 107, 107, 0.15); border:2px solid #ff6b6b; color:#ff6b6b; }
  .result.pending{ background: rgba(219, 206, 68, 0.15); border:2px solid var(--yellow); color: var(--yellow); }
  .result .code{ display:block; font-size:0.75rem; font-weight:500; color:#ffffff; margin-top:8px; }

  .category-badge{
    display:block;
    font-weight:900;
    font-size:1.9rem;
    letter-spacing:0.04em;
    text-transform:uppercase;
    text-align:center;
    border-radius:12px;
    padding:14px 10px;
    margin-bottom:12px;
    line-height:1.1;
  }
  .category-badge.cat-individual{ background: var(--yellow); color:#0a0a0a; }
  .category-badge.cat-grupal{ background: linear-gradient(135deg, #c41230, #7a0c1d); color:#ffffff; }
  .category-badge.cat-cortesia{ background: linear-gradient(135deg, #f0e58a, var(--yellow) 45%, #b8972a); color:#0a0a0a; }

  .result-details{ margin-top:10px; }
  .result-details p{ margin:4px 0; color:#ffffff; }
  .result-details p:first-of-type{ font-size:1.5rem; font-weight:900; line-height:1.25; }
  #resultDoc{ font-size:1.3rem; font-weight:800; }
  #resultQty{ font-size:0.85rem; font-weight:500; color:rgba(255,255,255,0.75); margin-top:8px !important; }

  .approve-qty{ display:flex; align-items:center; justify-content:center; gap:18px; margin-top:24px; }
  .approve-qty span{ font-size:0.8rem; color:rgba(255,255,255,0.7); }
  .approve-qty-btn{
    width:54px; height:54px; border-radius:14px; border:none;
    background:rgba(255,255,255,0.12); color:#ffffff; font-size:1.7rem;
    font-weight:800; cursor:pointer; touch-action: manipulation; user-select: none;
  }
  .approve-qty-btn:disabled{ opacity:0.3; cursor:not-allowed; }
  #approveQtyValue{ font-size:1.1rem; font-weight:800; color: var(--yellow); min-width:28px; display:inline-block; }

  .result-actions{ display:flex; gap:10px; margin-top:28px; }
  .approve-btn, .cancel-btn{
    flex:1;
    border:none;
    border-radius:10px;
    padding:12px;
    font-weight:800;
    font-size:0.78rem;
    letter-spacing:0.05em;
    text-transform:uppercase;
    cursor:pointer;
    touch-action: manipulation;
    user-select: none;
  }
  .approve-btn{ background:#2ecc71; color:#0a0a0a; }
  .cancel-btn{ background:rgba(255,255,255,0.1); color:#ffffff; }

  .stats{ margin:6px 0 0; font-size:0.75rem; color:rgba(255,255,255,0.5); flex:0 0 auto; }
</style>
</head>
<body>

<header>
  <h1>Escaneo de Tickets</h1>
  <p>THE TRIBE PT.II — Kuno Seafood Rooftop</p>
</header>

<main>

  <div class="gate" id="gate">
    <p>Ingresa la clave de acceso del personal:</p>
    <input type="password" id="gateInput" placeholder="Clave" autocomplete="off">
    <br>
    <button type="button" id="gateBtn">Entrar</button>
    <p class="gate-error" id="gateError">Clave incorrecta.</p>
  </div>

  <div id="scannerWrap" style="display:none;">
    <div id="reader"></div>
    <div class="result" id="result">
      <span class="category-badge" id="categoryBadge" style="display:none;"></span>
      <span id="resultMain"></span>
      <div class="result-details" id="resultDetails" style="display:none;">
        <p><span id="resultListLabel">Lista #</span><strong id="resultListNum"></strong> — <strong id="resultName"></strong></p>
        <p id="resultDoc"></p>
        <p id="resultQty"></p>
      </div>
      <div class="approve-qty" id="approveQtyWrap" style="display:none;">
        <button type="button" class="approve-qty-btn" id="approveQtyMinus" aria-label="Restar">&minus;</button>
        <span>Ingresan ahora: <span id="approveQtyValue">1</span></span>
        <button type="button" class="approve-qty-btn" id="approveQtyPlus" aria-label="Sumar">+</button>
      </div>
      <div class="result-actions" id="resultActions" style="display:none;">
        <button type="button" class="approve-btn" id="approveBtn">Aprobar entrada</button>
        <button type="button" class="cancel-btn" id="cancelBtn">Cancelar</button>
      </div>
      <span class="code" id="resultCode"></span>
    </div>
    <p class="stats" id="stats">0 entradas aprobadas</p>
  </div>

</main>

<script>
  const gate = document.getElementById('gate');
  const gateInput = document.getElementById('gateInput');
  const gateBtn = document.getElementById('gateBtn');
  const gateError = document.getElementById('gateError');
  const scannerWrap = document.getElementById('scannerWrap');
  const readerEl = document.getElementById('reader');
  const result = document.getElementById('result');
  const resultMain = document.getElementById('resultMain');
  const resultDetails = document.getElementById('resultDetails');
  const resultListNum = document.getElementById('resultListNum');
  const resultListLabel = document.getElementById('resultListLabel');
  const resultName = document.getElementById('resultName');
  const resultDoc = document.getElementById('resultDoc');
  const resultQty = document.getElementById('resultQty');
  const resultActions = document.getElementById('resultActions');
  const categoryBadge = document.getElementById('categoryBadge');
  const approveBtn = document.getElementById('approveBtn');
  const cancelBtn = document.getElementById('cancelBtn');
  const resultCode = document.getElementById('resultCode');
  const statsEl = document.getElementById('stats');
  const approveQtyWrap = document.getElementById('approveQtyWrap');
  const approveQtyValueEl = document.getElementById('approveQtyValue');
  const approveQtyMinus = document.getElementById('approveQtyMinus');
  const approveQtyPlus = document.getElementById('approveQtyPlus');

  // touch-action: manipulation en cada botón no alcanza cuando dos toques
  // rápidos caen en botones distintos (ej. tocar + dos veces seguidas): el
  // navegador lo puede interpretar como doble-tap y hacer zoom. Esto lo
  // bloquea a nivel de documento sin importar en qué elemento se toque.
  let lastTouchEnd = 0;
  document.addEventListener('touchend', (e) => {
    const now = Date.now();
    if(now - lastTouchEnd <= 350){
      e.preventDefault();
    }
    lastTouchEnd = now;
  }, { passive: false });

  let scanKey = sessionStorage.getItem('rh_scan_key') || '';
  // Para reiniciar el contador manualmente (ej. tras una prueba) basta con
  // abrir esta página con ?reset=1 al final de la URL una sola vez.
  if(new URLSearchParams(window.location.search).get('reset') === '1'){
    localStorage.removeItem('rh_scanned_count');
  }
  // Vive en localStorage (no sessionStorage) para que sobreviva a recargas
  // de la página durante toda la noche del evento; solo se pierde si se
  // borran los datos del navegador o se abre el escáner en otro dispositivo.
  let scannedCount = parseInt(localStorage.getItem('rh_scanned_count'), 10) || 0;
  let busy = false;
  let scanner = null;
  let pendingCode = '';
  let approveMax = 1;
  let approveQty = 1;

  function setApproveQty(n){
    approveQty = Math.min(approveMax, Math.max(1, n));
    approveQtyValueEl.textContent = approveQty;
    approveQtyMinus.disabled = approveQty <= 1;
    approveQtyPlus.disabled = approveQty >= approveMax;
  }

  approveQtyMinus.addEventListener('click', () => setApproveQty(approveQty - 1));
  approveQtyPlus.addEventListener('click', () => setApproveQty(approveQty + 1));

  function startScanner(){
    gate.style.display = 'none';
    scannerWrap.style.display = 'flex';
    statsEl.textContent = scannedCount + ' entradas aprobadas';

    scanner = new Html5Qrcode('reader');
    scanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: 240 },
      (decodedText) => handleScan(decodedText)
    ).catch((err) => {
      showFail('No se pudo abrir la cámara: ' + err);
    });
  }

  // Clasifica el ticket para mostrar de un vistazo qué tipo es — esto es lo
  // que más le importa al encargado de la puerta para leerlo rápido.
  function categoryFor(data){
    if(data.isGuest) return { label: 'CORTESÍA', cls: 'cat-cortesia' };
    if(data.quantity > 1) return { label: 'GRUPAL', cls: 'cat-grupal' };
    return { label: 'INDIVIDUAL', cls: 'cat-individual' };
  }

  function showCategory(data){
    const cat = categoryFor(data);
    categoryBadge.textContent = cat.label;
    categoryBadge.className = 'category-badge ' + cat.cls;
    categoryBadge.style.display = 'block';
  }

  function hideCategory(){
    categoryBadge.style.display = 'none';
  }

  function listLabelFor(data){
    if(data.isGuest && data.guestListNumber) return { label: 'Invitado #', value: data.guestListNumber };
    if(data.isGuest) return { label: '', value: '(sin número, buscar por nombre)' };
    return { label: 'Lista #', value: data.listNumber };
  }

  function showFail(message, data){
    result.className = 'result fail';
    if(data){ showCategory(data); } else { hideCategory(); }
    resultMain.textContent = '✗ ' + message;
    resultDetails.style.display = 'none';
    approveQtyWrap.style.display = 'none';
    resultActions.style.display = 'none';
    result.style.display = 'flex';
    scannerWrap.classList.add('compact');
    setTimeout(resumeScanning, 1800);
  }

  function resumeScanning(){
    result.style.display = 'none';
    scannerWrap.classList.remove('compact');
    pendingCode = '';
    busy = false;
    if(scanner) scanner.resume();
  }

  async function handleScan(code){
    if(busy) return;
    busy = true;
    if(scanner) scanner.pause();
    pendingCode = code;

    try{
      const res = await fetch('/api/tickets/lookup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-scan-key': scanKey },
        body: JSON.stringify({ code })
      });

      if(res.status === 401){
        sessionStorage.removeItem('rh_scan_key');
        location.reload();
        return;
      }

      const data = await res.json();
      resultCode.textContent = code;

      if(!data.found){
        showFail('Código no válido');
        return;
      }
      if(data.used){
        const listInfo = listLabelFor(data);
        const who = data.cardholderName ? ' — ' + data.cardholderName + ' (' + listInfo.label + listInfo.value + ')' : '';
        const progreso = data.quantity > 1 ? ` · ${data.entriesApproved}/${data.quantity} ingresaron` : '';
        showFail('Ya fue usado por completo' + who + progreso + (data.usedAt ? ' · ' + new Date(data.usedAt).toLocaleTimeString() : ''), data);
        return;
      }

      result.className = 'result pending';
      showCategory(data);
      resultMain.textContent = data.entriesApproved > 0
        ? `Ticket parcial — ya ingresaron ${data.entriesApproved} de ${data.quantity}`
        : `Ticket encontrado`;
      const listInfo = listLabelFor(data);
      resultListLabel.textContent = listInfo.label;
      resultListNum.textContent = listInfo.value;
      resultName.textContent = data.cardholderName || '(sin nombre)';
      resultDoc.textContent = data.document ? `Cédula: ${data.document}` : '';
      resultQty.textContent = data.quantity > 1 ? `Grupo de ${data.quantity} personas · quedan ${data.remaining} por ingresar` : '1 persona';
      resultDetails.style.display = 'block';

      if(data.quantity > 1){
        approveMax = data.remaining;
        setApproveQty(data.remaining);
        approveQtyWrap.style.display = 'flex';
      } else {
        approveMax = 1;
        setApproveQty(1);
        approveQtyWrap.style.display = 'none';
      }

      resultActions.style.display = 'flex';
      result.style.display = 'flex';
      scannerWrap.classList.add('compact');
    } catch(err){
      showFail('Error de conexión, intenta de nuevo');
    }
  }

  approveBtn.addEventListener('click', async () => {
    if(!pendingCode) return;
    try{
      const res = await fetch('/api/tickets/approve', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-scan-key': scanKey },
        body: JSON.stringify({ code: pendingCode, count: approveQty })
      });
      const data = await res.json();

      if(data.approved){
        scannedCount += data.approvedNow;
        localStorage.setItem('rh_scanned_count', scannedCount);
        statsEl.textContent = scannedCount + ' entradas aprobadas';
        result.className = 'result ok';
        resultMain.textContent = data.remaining > 0
          ? `✓ Ingresaron ${data.approvedNow} — quedan ${data.remaining} de ${data.quantity} por ingresar`
          : '✓ Entrada aprobada';
        if(data.quantity > 1){
          resultQty.textContent = data.remaining > 0
            ? `Grupo de ${data.quantity} personas · quedan ${data.remaining} por ingresar`
            : `Grupo de ${data.quantity} personas · todos ingresaron`;
        }
        resultActions.style.display = 'none';
        approveQtyWrap.style.display = 'none';
        setTimeout(resumeScanning, 1800);
      } else {
        showFail('Ya fue usado por completo');
      }
    } catch(err){
      showFail('Error de conexión, intenta de nuevo');
    }
  });

  cancelBtn.addEventListener('click', resumeScanning);

  gateBtn.addEventListener('click', () => {
    scanKey = gateInput.value.trim();
    if(!scanKey){ return; }
    sessionStorage.setItem('rh_scan_key', scanKey);
    gateError.style.display = 'none';
    startScanner();
  });

  gateInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter') gateBtn.click();
  });

  if(scanKey){
    startScanner();
  }
</script>

</body>
</html>
